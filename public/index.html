      :root {
        --bg: #f3f6fb;
        --panel: #ffffff;
        --blue: #1d4ed8;
        --blue-dark: #1e3a8a;
        --text: #0f172a;
        --muted: #475569;
        --line: #dbe3ef;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .wrap {
        max-width: 1150px;
        margin: 0 auto;
        padding: 22px;
      }

      .hero {
        background: var(--panel);
        border-radius: 14px;
        padding: 22px;
        border: 1px solid var(--line);
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
      }

      .hero-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .hero h1 {
        margin: 0;
        font-size: 28px;
      }

      .hero p {
        margin: 8px 0 0;
        color: var(--muted);
      }

      .meta-panel {
        margin-top: 12px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #f8fafc;
        display: grid;
        gap: 6px;
      }

      .meta-row {
        font-size: 13px;
        color: var(--muted);
      }

      .filters {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .filters select,
      .filters input {
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-family: inherit;
        background: #fff;
      }

      .account-panel {
        margin-top: 12px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #f8fafc;
      }

      .account-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin-top: 8px;
      }

      .account-row input {
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-family: inherit;
        background: #fff;
      }

      .review-form {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--line);
        display: grid;
        gap: 8px;
      }

      .review-form select,
      .review-form textarea {
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-family: inherit;
        background: #fff;
      }

      .verify-message {
        margin-top: 8px;
        font-size: 13px;
        color: var(--muted);
      }

      button {
        border-radius: 10px;
        border: none;
        background: var(--blue);
        color: #fff;
        padding: 8px 12px;
        cursor: pointer;
        font-weight: 600;
      }

      button:hover {
        background: var(--blue-dark);
      }

      .status {
        margin: 14px 0;
        padding: 10px 12px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        color: var(--muted);
      }

      .ad-slot {
        margin: 12px 0;
        border: 1px dashed #94a3b8;
        border-radius: 10px;
        background: #f8fafc;
        padding: 10px;
      }

      .ad-label {
        font-size: 12px;
        color: #64748b;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .ad-box {
        min-height: 90px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #334155;
        font-size: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
      }

      .area-section {
        background: var(--panel);
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 14px;
        margin-bottom: 14px;
        box-shadow: 0 2px 8px rgba(15, 23, 42, 0.03);
      }

      .area-section h3 {
        margin: 0 0 10px;
      }

      .area-table {
        width: 100%;
        border-collapse: collapse;
      }

      .area-table th,
      .area-table td {
        border: 1px solid var(--line);
        padding: 10px;
        text-align: left;
        vertical-align: top;
      }

      .area-table th {
        background: #eef2f7;
        font-weight: 700;
      }

      .school-row {
        cursor: pointer;
      }

      .school-row:hover {
        background: #f1f5ff;
      }

      .subtext {
        color: var(--muted);
        font-size: 13px;
      }

      .profile {
        background: var(--panel);
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 16px;
      }

      .toolbar {
        margin-bottom: 12px;
      }

      .hidden {
        display: none;
      }

      .chat-toggle {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 80;
      }

      .chat-panel {
        position: fixed;
        right: 18px;
        bottom: 72px;
        width: 340px;
        max-width: calc(100vw - 24px);
        height: 440px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.18);
        z-index: 80;
        display: flex;
        flex-direction: column;
      }

      .chat-head {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        font-weight: 700;
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
        display: grid;
        gap: 8px;
        align-content: start;
      }

      .chat-bubble {
        padding: 8px 10px;
        border-radius: 10px;
        font-size: 13px;
        line-height: 1.4;
        max-width: 90%;
      }

      .chat-bot {
        background: #eef2ff;
        border: 1px solid #c7d2fe;
      }

      .chat-user {
        background: #dbeafe;
        border: 1px solid #93c5fd;
        margin-left: auto;
      }

      .chat-quick {
        padding: 0 10px 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .chat-quick button {
        background: #e2e8f0;
        color: #0f172a;
        padding: 6px 8px;
        font-size: 12px;
      }

      .chat-input {
        border-top: 1px solid var(--line);
        padding: 10px;
        display: flex;
        gap: 8px;
      }

      .chat-input input {
        flex: 1;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-family: inherit;
      }
    </style>
  </head>

    <main class="wrap">
      <section class="hero">
        <div class="hero-top">
          <h1 id="heroTitle">香港幼稚園排名</h1>
          <button id="langToggle">EN</button>
        </div>
        <p id="heroSubtitle">按地區顯示每區排名前 5 的幼稚園</p>
        <p id="heroDisclaimer" class="subtext"></p>
        <div class="meta-panel">
          <div class="meta-row" id="metaSource"></div>
          <div class="meta-row" id="metaTotal"></div>
          <div class="meta-row" id="metaUpdated"></div>
          <div class="meta-row" id="metaMethod"></div>
        </div>
        <div class="filters">
          <select id="filterArea"></select>
          <select id="filterType"></select>
          <input id="filterScore" type="number" min="0" max="5" step="0.1" placeholder="最低平均分" />
          <button id="filterApply">套用篩選</button>
          <button id="filterReset">重設</button>
        </div>
        <div class="account-panel">
          <div class="meta-row" id="authStatusText"></div>
          <div class="account-row">
            <button id="googleLoginBtn">Google 登入</button>
            <button id="sendCodeBtn">發送驗證碼</button>
            <input id="verifyCodeInput" type="text" maxlength="6" placeholder="6位驗證碼" />
            <button id="verifyCodeBtn">驗證電郵</button>
          </div>
          <div id="captchaContainer" class="account-row"></div>
          <div id="verifyMessage" class="verify-message"></div>
        </div>
      </section>

      <div id="status" class="status">正在載入學校資料...</div>

      <section id="homeView">
        <div class="ad-slot" id="homeAdSlot">
          <div class="ad-label" id="homeAdLabel">廣告</div>
          <div class="ad-box" id="homeAdBox"></div>
        </div>
        <div id="areaContainer"></div>
      </section>

      <section id="areaView" class="hidden">
        <div class="toolbar">
          <button id="backToHomeBtn">← 返回首頁</button>
        </div>
        <article class="area-section">
          <h3 id="areaTitle"></h3>
          <div class="ad-slot" id="areaAdSlot">
            <div class="ad-label" id="areaAdLabel">廣告</div>
            <div class="ad-box" id="areaAdBox"></div>
          </div>
          <table class="area-table">
            <thead>
              <tr>
                <th id="areaColSchool">學校</th>
                <th id="areaColCampus">校舍</th>
                <th id="areaColType">類別</th>
                <th id="areaColGoogle">Google 評分</th>
                <th id="areaColAvg">平均分</th>
                <th id="areaColReviews">評論數</th>
              </tr>
            </thead>
            <tbody id="areaTableBody"></tbody>
          </table>
        </article>
      </section>

      <section id="profileView" class="hidden">
        <div class="toolbar">
          <button id="backBtn">← 返回首頁</button>
        </div>
        <article id="profileCard" class="profile"></article>
        <div class="ad-slot" id="profileAdSlot">
          <div class="ad-label" id="profileAdLabel">廣告</div>
          <div class="ad-box" id="profileAdBox"></div>
        </div>
      </section>
    </main>

    <button id="chatToggle" class="chat-toggle">助理</button>
    <section id="chatPanel" class="chat-panel hidden">
      <div class="chat-head" id="chatTitle">網站助理</div>
      <div id="chatMessages" class="chat-messages"></div>
      <div id="chatQuick" class="chat-quick"></div>
      <div class="chat-input">
        <input id="chatInput" type="text" placeholder="輸入問題，例如：如何驗證電郵？" />
        <button id="chatSend">送出</button>
      </div>
    </section>

      function detectAreaIntent(message) {
        const text = String(message || '').toLowerCase().trim();
        const matchers = [
          { key: 'tuenmun', terms: ['屯門', 'tuen mun', 'tuenmun'] },
          { key: 'shatin', terms: ['沙田', 'sha tin', 'shatin'] },
          { key: 'yuenlong', terms: ['元朗', 'yuen long', 'yuenlong'] },
          { key: 'tsuenwan', terms: ['荃灣', 'tsuen wan', 'tsuenwan'] },
          { key: 'north', terms: ['北區', 'north district', 'north'] },
          { key: 'taipo', terms: ['大埔', 'tai po', 'taipo'] },
          { key: 'kowlooncity', terms: ['九龍城', 'kowloon city', 'kowlooncity'] },
          { key: 'kwuntong', terms: ['觀塘', 'kwun tong', 'kwuntong'] },
          { key: 'wanchai', terms: ['灣仔', 'wan chai', 'wanchai'] },
          { key: 'central', terms: ['中西區', 'central', 'central and western'] },
        ];

        for (const item of matchers) {
          if (item.terms.some((term) => text.includes(term))) return item.key;
        }

        return '';
      }

      async function navigateAreaFromChat(areaKey) {
        if (!areaKey) return;
        appendChatMessage('bot', `${t('chatNavigating')}${formatArea(areaKey)}`);
        history.pushState({ areaKey }, '', `/?area=${encodeURIComponent(areaKey)}`);
        await loadArea(areaKey);
      }

      async function handleChatIntent(rawText) {
        const text = String(rawText || '').toLowerCase().trim();
        const areaKey = detectAreaIntent(text);
        if (areaKey) {
          await navigateAreaFromChat(areaKey);
          return;
        }

        if (text.includes('top') || text.includes('排行') || text.includes('前 5') || text.includes('top5')) {
          appendChatMessage('bot', t('chatTop5'));
          return;
        }

        if (text.includes('login') || text.includes('登入') || text.includes('google')) {
          appendChatMessage('bot', t('chatLogin'));
          return;
        }

        if (text.includes('verify') || text.includes('驗證') || text.includes('電郵') || text.includes('email')) {
          appendChatMessage('bot', t('chatVerify'));
          return;
        }

        if (text.includes('review') || text.includes('評分') || text.includes('評論')) {
          appendChatMessage('bot', t('chatReview'));
          return;
        }

        if (text.includes('area') || text.includes('地區')) {
          appendChatMessage('bot', t('chatAreas'));
          return;
        }

        appendChatMessage('bot', t('chatUnknown'));
      }

      function resetCaptchaWidget() {
        captchaToken = '';
        if (!captchaConfig?.siteKey) return;

        if (captchaConfig.provider === 'turnstile' && window.turnstile && captchaWidgetId !== null) {
          window.turnstile.reset(captchaWidgetId);
        }

        if (captchaConfig.provider === 'recaptcha' && window.grecaptcha && captchaWidgetId !== null) {
          window.grecaptcha.reset(captchaWidgetId);
        }
      }

      async function loadCaptchaConfig() {
        try {
          captchaConfig = await fetchJson('/api/auth/captcha-config');
        } catch {
          captchaConfig = { provider: 'recaptcha', siteKey: '', enabled: false };
        }
      }

      function loadCaptchaScript() {
        if (!captchaConfig?.siteKey) {
          captchaContainer.textContent = t('captchaNotConfigured');
          return Promise.resolve();
        }

        if (captchaProviderLoaded) return Promise.resolve();

        const script = document.createElement('script');
        script.async = true;
        script.defer = true;
        script.src =
          captchaConfig.provider === 'recaptcha'
            ? 'https://www.google.com/recaptcha/api.js?render=explicit'
            : 'https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit';

        return new Promise((resolve, reject) => {
          script.onload = () => {
            captchaProviderLoaded = true;
            resolve();
          };
          script.onerror = reject;
          document.head.appendChild(script);
        });
      }

      function renderCaptchaWidget() {
        if (!captchaConfig?.siteKey) return;
        captchaContainer.innerHTML = '';

        const widgetHost = document.createElement('div');
        captchaContainer.appendChild(widgetHost);

        if (captchaConfig.provider === 'recaptcha' && window.grecaptcha) {
          captchaWidgetId = window.grecaptcha.render(widgetHost, {
            sitekey: captchaConfig.siteKey,
            callback: (token) => {
              captchaToken = token;
            },
            'expired-callback': () => {
              captchaToken = '';
            },
          });
        }

        if (captchaConfig.provider === 'turnstile' && window.turnstile) {
          captchaWidgetId = window.turnstile.render(widgetHost, {
            sitekey: captchaConfig.siteKey,
            callback: (token) => {
              captchaToken = token;
            },
            'expired-callback': () => {
              captchaToken = '';
            },
          });
        }
      }

      function getCaptchaTokenOrFail() {
        if (!captchaConfig?.siteKey) {
          // dev bypass – backend also bypasses when not configured
          return 'dev-bypass';
        }

        if (!captchaToken) {
          setVerifyMessage(t('captchaMissing'));
          return '';
        }

        return captchaToken;
      }

      async function sendEmailVerificationCode() {
        if (!authUser) {
          setVerifyMessage(t('loginRequired'));
          return;
        }

        const token = getCaptchaTokenOrFail();
        if (!token) return;

        const response = await fetch('/api/auth/email/send-code', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ captchaToken: token }),
        });

        const json = await response.json().catch(() => ({}));
        if (!response.ok) {
          setVerifyMessage(json.error || t('failed'));
          resetCaptchaWidget();
          return;
        }

        setVerifyMessage(json.devCode ? `${t('verifyCodeSent')} (${json.devCode})` : t('verifyCodeSent'));
        resetCaptchaWidget();
      }

      async function verifyEmailCode() {
        if (!authUser) {
          setVerifyMessage(t('loginRequired'));
          return;
        }

        const code = String(verifyCodeInput.value || '').trim();
        const token = getCaptchaTokenOrFail();
        if (!token) return;

        const response = await fetch('/api/auth/email/verify', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, captchaToken: token }),
        });

        const json = await response.json().catch(() => ({}));
        if (!response.ok) {
          setVerifyMessage(json.error || t('failed'));
          resetCaptchaWidget();
          return;
        }

        setVerifyMessage(t('verifyCodeSuccess'));
        verifyCodeInput.value = '';
        resetCaptchaWidget();
        await loadAuthMe();
      }

      function formatArea(areaKey) {
        const key = String(areaKey || '').toLowerCase();
        return areaLabel[key]?.[currentLang] || areaKey;
      }

      function normalizeBaseName(name) {
        return String(name || '')
          .replace(/[（(][^）)]*[）)]/g, '')
          .replace(/[^\p{L}\p{N}]+/gu, '')
          .toLowerCase()
          .trim();
      }

      function extractCampusFromName(name) {
        const text = String(name || '');
        const match = text.match(/[（(]([^）)]+)[）)]/);
        return match ? match[1].trim() : '';
      }

      function canonicalSchoolKey(school) {
        const rawName = String(school.chineseName || school.name || '');
        const campus =
          extractCampusFromName(school.chineseName || '') ||
          extractCampusFromName(school.name || '') ||
          String(school.district || '');

        const normalizedName = rawName
          .normalize('NFKC')
          .replace(/[（(][^）)]*[）)]/g, '')
          .replace(/KINDERGARTEN|NURSERY|PRE\s*-?SCHOOL|INTERNATIONAL/gi, '')
          .replace(/幼稚園|幼兒園|幼兒學校|國際/g, '')
          .replace(/[^\p{L}\p{N}]+/gu, '')
          .toLowerCase()
          .trim();

        const normalizedCampus = String(campus)
          .normalize('NFKC')
          .replace(/[^\p{L}\p{N}]+/gu, '')
          .toLowerCase()
          .trim();

        return `${normalizedName}::${normalizedCampus}`;
      }

      function choosePreferredSchool(existing, incoming) {
        const existingIsKg = /KINDERGARTEN|幼稚園/i.test(existing.name || '') || /幼稚園/.test(existing.chineseName || '');
        const incomingIsKg = /KINDERGARTEN|幼稚園/i.test(incoming.name || '') || /幼稚園/.test(incoming.chineseName || '');

        if (incomingIsKg && !existingIsKg) return incoming;
        if (!incomingIsKg && existingIsKg) return existing;

        const existingRating = existing.avgRating ?? -1;
        const incomingRating = incoming.avgRating ?? -1;
        if (incomingRating > existingRating) return incoming;

        return existing;
      }

      function collapseSimilarSchools(schools) {
        const map = new Map();

        for (const school of schools || []) {
          const key = canonicalSchoolKey(school);
          if (!map.has(key)) {
            map.set(key, school);
          } else {
            map.set(key, choosePreferredSchool(map.get(key), school));
          }
        }

        return [...map.values()];
      }

      }

      function applyFilters(schools, forcedArea) {
        const areaKey = forcedArea || filterState.area;
        const type = filterState.type;
        const minScore = filterState.minScore === '' ? null : Number(filterState.minScore);

        return (schools || []).filter((school) => {
          if (areaKey && school.area?.name !== areaKey) return false;
          if (type && school.type !== type) return false;
          if (minScore !== null) {
            if (school.avgRating === null || school.avgRating === undefined) return false;
            if (Number(school.avgRating) < minScore) return false;
          }
          return true;
        });
      }

      function groupTopByArea(schools, limit) {
        const grouped = new Map();

        for (const school of schools) {
          const key = school.area?.name || 'other';
          if (!grouped.has(key)) grouped.set(key, []);
          grouped.get(key).push(school);
        }

        return [...grouped.entries()].map(([area, rows]) => {
          const ranked = [...rows].sort((a, b) => {
            const aWeighted = a.weightedScore ?? a.avgRating ?? -1;
            const bWeighted = b.weightedScore ?? b.avgRating ?? -1;
            if (bWeighted !== aWeighted) return bWeighted - aWeighted;
            if ((b.reviewCount ?? 0) !== (a.reviewCount ?? 0)) return (b.reviewCount ?? 0) - (a.reviewCount ?? 0);
            return String(a.name || '').localeCompare(String(b.name || ''));
          });

          return { area, schools: ranked.slice(0, limit) };
        });
      }

        function googleScoreValue(school) {
          const value = school.googleReviewScore ?? school.googleScore ?? null;
          return value === null || value === undefined || value === '' ? '-' : value;
        }

      async function fetchJson(url) {
        const response = await fetch(url, { credentials: 'include' });
        if (!response.ok) throw new Error(`Request failed (${response.status})`);
        return response.json();
      }

      function buildDuplicateCampusMap(groups) {
        const allSchools = groups.flatMap((g) => g.schools || []);
        const buckets = new Map();

        for (const school of allSchools) {
          const base = normalizeBaseName(school.chineseName || school.name);
          if (!base) continue;
          if (!buckets.has(base)) buckets.set(base, []);
          buckets.get(base).push(school);
        }

        const campusById = new Map();
        for (const list of buckets.values()) {
          if (list.length < 2) continue;
          for (const school of list) {
            const campusFromName =
              extractCampusFromName(school.chineseName || '') ||
              extractCampusFromName(school.name || '');
            campusById.set(school.id, campusFromName || school.district || t('na'));
          }
        }

        return campusById;
      }

        statusEl.textContent = `${t('viewingProfile')}${schoolPrimaryName(school)}`;
      }

      async function submitProfileReview(kindergartenId) {
        if (!authUser) {
          setVerifyMessage(t('reviewNeedLogin'));
          return;
        }

        // skip email-verification gate when backend does not require it
        if (captchaConfig?.requireEmailVerified !== false && !authUser.emailVerifiedAt) {
          setVerifyMessage(t('reviewNeedVerify'));
          return;
        }

        const token = getCaptchaTokenOrFail();
        if (!token) return;

        const ratingEl = document.getElementById('profileReviewRating');
        const commentEl = document.getElementById('profileReviewComment');
        const rating = Number(ratingEl?.value || 0);
        const comment = String(commentEl?.value || '').trim();

        const response = await fetch('/api/reviews', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ kindergartenId, rating, comment, captchaToken: token }),
        });

        const json = await response.json().catch(() => ({}));
        if (!response.ok) {
          setVerifyMessage(json.error || t('failed'));
          resetCaptchaWidget();
          return;
        }

        setVerifyMessage(t('reviewSuccess'));
        if (commentEl) commentEl.value = '';
        resetCaptchaWidget();
        await loadProfile(kindergartenId);
      }

      async function loadHome() {
        statusEl.textContent = t('loadingSchools');
        allSchoolsCache = await fetchJson('/api/kindergartens');
        renderFilterOptions();
        updateMetaStats();
        const filtered = applyFilters(allSchoolsCache);
        const groups = groupTopByArea(filtered, 5);
        renderHome(groups);
      }

      async function loadProfile(id) {
        statusEl.textContent = t('loadingProfile');
        const school = await fetchJson(`/api/kindergartens/${id}`);
        renderProfile(school);
      }

      async function loadArea(areaKey) {
        statusEl.textContent = t('loadingSchools');
        const schools = await fetchJson(`/api/kindergartens?area=${encodeURIComponent(areaKey)}`);
        const filtered = applyFilters(schools, areaKey);
        renderAreaDetail(areaKey, filtered);
      }

      function syncFilterStateFromInputs() {
        filterState = {
          area: filterArea.value,
          type: filterType.value,
          minScore: filterScore.value,
        };
      }

      googleLoginBtn.addEventListener('click', () => {
        window.location.href = '/api/auth/google';
      });

      sendCodeBtn.addEventListener('click', async () => {
        try {
          await sendEmailVerificationCode();
        } catch (error) {
          setVerifyMessage(error?.message || t('failed'));
        }
      });

      verifyCodeBtn.addEventListener('click', async () => {
        try {
          await verifyEmailCode();
        } catch (error) {
          setVerifyMessage(error?.message || t('failed'));
        }
      });

      chatToggle.addEventListener('click', () => {
        chatPanel.classList.toggle('hidden');
      });

      chatSend.addEventListener('click', async () => {
        const text = String(chatInput.value || '').trim();
        if (!text) return;
        appendChatMessage('user', text);
        chatInput.value = '';
        await handleChatIntent(text);
      });

      chatInput.addEventListener('keydown', async (event) => {
        if (event.key !== 'Enter') return;
        event.preventDefault();
        const text = String(chatInput.value || '').trim();
        if (!text) return;
        appendChatMessage('user', text);
        chatInput.value = '';
        await handleChatIntent(text);
      });

      langToggle.addEventListener('click', () => {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        applyLanguageUI();

        if (!profileView.classList.contains('hidden') && cachedProfile) {
          renderProfile(cachedProfile);
        } else if (!areaView.classList.contains('hidden') && cachedAreaSchools.length) {
          renderAreaDetail(cachedAreaKey, cachedAreaSchools);
        } else if (cachedGroups.length) {
          renderHome(cachedGroups);
        }
      });

      filterApply.addEventListener('click', async () => {
        syncFilterStateFromInputs();

        const url = new URL(window.location.href);
        const schoolId = url.searchParams.get('school');
        const areaKey = url.searchParams.get('area');

        if (schoolId) {
          await loadProfile(schoolId);
          return;
        }

        if (areaKey) {
          await loadArea(areaKey);
          return;
        }

        await loadHome();
      });

      filterReset.addEventListener('click', async () => {
        filterState = { area: '', type: '', minScore: '' };
        renderFilterOptions();

        const url = new URL(window.location.href);
        const schoolId = url.searchParams.get('school');
        const areaKey = url.searchParams.get('area');

        if (schoolId) {
          await loadProfile(schoolId);
          return;
        }

        if (areaKey) {
          await loadArea(areaKey);
          return;
        }

        await loadHome();
      });

      areaContainer.addEventListener('click', async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;

        const areaButton = target.closest('[data-area-key]');
        if (areaButton) {
          const areaKey = areaButton.getAttribute('data-area-key');
          if (!areaKey) return;
          history.pushState({ areaKey }, '', `/?area=${encodeURIComponent(areaKey)}`);
          await loadArea(areaKey);
          return;
        }

        const row = target.closest('[data-school-id]');
        if (!row) return;

        const schoolId = row.getAttribute('data-school-id');
        if (!schoolId) return;

        history.pushState({ schoolId }, '', `/?school=${encodeURIComponent(schoolId)}`);
        await loadProfile(schoolId);
      });

      backBtn.addEventListener('click', async () => {
        const url = new URL(window.location.href);
        const areaKey = url.searchParams.get('area');
        if (areaKey) {
          history.pushState({ areaKey }, '', `/?area=${encodeURIComponent(areaKey)}`);
          await loadArea(areaKey);
          return;
        }

        history.pushState({}, '', '/');
        await loadHome();
      });

      backToHomeBtn.addEventListener('click', async () => {
        history.pushState({}, '', '/');
        await loadHome();
      });

      areaTableBody.addEventListener('click', async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;

        const row = target.closest('[data-school-id]');
        if (!row) return;

        const schoolId = row.getAttribute('data-school-id');
        if (!schoolId) return;

        const areaKey = cachedAreaKey ? `&area=${encodeURIComponent(cachedAreaKey)}` : '';
        history.pushState({ schoolId }, '', `/?school=${encodeURIComponent(schoolId)}${areaKey}`);
        await loadProfile(schoolId);
      });

      window.addEventListener('popstate', async () => {
        const url = new URL(window.location.href);
        const schoolId = url.searchParams.get('school');
        const areaKey = url.searchParams.get('area');
        if (schoolId) {
          await loadProfile(schoolId);
        } else if (areaKey) {
          await loadArea(areaKey);
        } else {
          await loadHome();
        }
      });

      (async () => {
        try {
          applyLanguageUI();
          await loadAuthMe();
          await loadCaptchaConfig();
          try {
            await loadCaptchaScript();
            renderCaptchaWidget();
          } catch {
            setVerifyMessage(t('captchaNotConfigured'));
          }
          setupAds();
          const url = new URL(window.location.href);
          const schoolId = url.searchParams.get('school');
          const areaKey = url.searchParams.get('area');
          if (schoolId) await loadProfile(schoolId);
          else if (areaKey) await loadArea(areaKey);
          else await loadHome();
        } catch (error) {
          statusEl.textContent = error.message || t('failed');
        }
      })();
    </script>
  </body>
</html>
